[character]
success_symbol = " [оҠ…](green)"
error_symbol = " [пҖҚ](red)"
vicmd_symbol = "[ оҳ« ](yellow)"

[hostname]
ssh_only = true
format = "[$hostname](bold blue) "
disabled = false

[cmd_duration]
min_time = 1
format = "[оӮ¶](fg:black bg:none)[$duration]($style)[оӮҙ](fg:black bg:black)[оӮ¶](fg:purple bg:black)[пү’](fg:black bg:purple)[оӮҙ](fg:purple bg:none) "
disabled = false
style = "fg:white bg:black"

[directory]
format = "[оӮ¶](fg:black bg:none)[$path]($style)[оӮҙ](fg:black bg:black)[оӮ¶](fg:blue bg:black)[пҒ»](fg:black bg:blue)[оӮҙ](fg:blue bg:none)"
style = "fg:white bg:black"
truncation_length = 3
truncate_to_repo=false

[git_branch]
format = "[оӮ¶](fg:black bg:none)[$branch]($style)[оӮҙ](fg:black bg:black)[оӮ¶](fg:green bg:black)[пҗҳ](fg:black bg:green)[оӮҙ](fg:green bg:none) "
style = "fg:white bg:black"

[git_status]
format="[оӮ¶](fg:black bg:none)[$all_status$ahead_behind]($style)[оӮҙ](fg:black bg:black)[оӮ¶](fg:red bg:black)[оңҲ](fg:black bg:red)[оӮҙ](fg:red bg:none) "
style = "fg:white bg:black"
conflicted = "="
ahead =	"вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
up_to_date = "у°„¬"
untracked = "?${count}"
stashed = "у°җғ"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "-${count}"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge =	"MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style =	"yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

