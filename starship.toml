## CROSS-SHELL PROMPT
##
## rxyhn's starship configuration
## The minimal, blazing-fast, and infinitely customizable prompt for any shell!

format = "$all"
right_format = """$git_branch$git_status$cmd_duration$directory $os """

# Disable the blank line at the start of the prompt
add_newline = false

[line_break]
disabled = true

[os]
format = "[оӮ¶](fg:blue bg:none)[$symbol](fg:white bg:blue)($style)[оӮҙ](fg:blue bg:none)"
style = "bold blue"
disabled = false

